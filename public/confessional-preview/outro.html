<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Confessional - Outro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0f0f;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    color: #e8e0d4;
  }

  .container {
    text-align: center;
    padding: 2rem;
    animation: fade-in 1s ease-out;
  }

  @keyframes fade-in {
    0% { opacity: 0; transform: translateY(15px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* Checkmark animation */
  .check-circle {
    width: min(28vw, 28vh, 120px);
    height: min(28vw, 28vh, 120px);
    margin: 0 auto 2rem;
    position: relative;
  }

  .check-circle svg {
    width: 100%;
    height: 100%;
  }

  .circle-bg {
    fill: none;
    stroke: rgba(42, 157, 143, 0.15);
    stroke-width: 2;
  }

  .circle-progress {
    fill: none;
    stroke: #2a9d8f;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-dasharray: 283;
    stroke-dashoffset: 283;
    animation: circle-draw 1s ease-out 0.3s forwards;
    transform: rotate(-90deg);
    transform-origin: center;
  }

  @keyframes circle-draw {
    to { stroke-dashoffset: 0; }
  }

  .checkmark {
    fill: none;
    stroke: #2a9d8f;
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 40;
    stroke-dashoffset: 40;
    animation: check-draw 0.5s ease-out 1.2s forwards;
  }

  @keyframes check-draw {
    to { stroke-dashoffset: 0; }
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 5vw, 2.5rem);
    color: #e8e0d4;
    margin-bottom: 1rem;
    animation: fade-in 0.8s ease-out 1s both;
  }

  .message {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: clamp(1rem, 3vw, 1.3rem);
    color: #c2a478;
    animation: fade-in 0.8s ease-out 1.3s both;
    margin-bottom: 0.5rem;
  }

  .beer-hint {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: clamp(0.85rem, 2.2vw, 1rem);
    color: rgba(232, 224, 212, 0.5);
    animation: fade-in 0.8s ease-out 1.6s both;
    margin-top: 2rem;
  }

  /* Subtle confetti-like particles */
  .sparkle {
    position: fixed;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    animation: sparkle-float 3s ease-out forwards;
    opacity: 0;
  }

  @keyframes sparkle-float {
    0% { transform: translateY(0) scale(0); opacity: 0; }
    20% { opacity: 0.8; transform: scale(1); }
    100% { transform: translateY(-30vh) scale(0.3); opacity: 0; }
  }

  .sparkle:nth-child(1) { left: 15%; top: 60%; background: #2a9d8f; animation-delay: 1.4s; }
  .sparkle:nth-child(2) { left: 30%; top: 55%; background: #c2a478; animation-delay: 1.6s; }
  .sparkle:nth-child(3) { left: 45%; top: 65%; background: #2a9d8f; animation-delay: 1.5s; }
  .sparkle:nth-child(4) { left: 60%; top: 58%; background: #c2a478; animation-delay: 1.7s; }
  .sparkle:nth-child(5) { left: 75%; top: 62%; background: #2a9d8f; animation-delay: 1.3s; }
  .sparkle:nth-child(6) { left: 85%; top: 50%; background: #c2a478; animation-delay: 1.8s; }

  /* Bottom teal accent */
  .tile-accent {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg,
      transparent 0%,
      #2a9d8f 20%,
      #40b5a6 50%,
      #2a9d8f 80%,
      transparent 100%
    );
    opacity: 0.6;
  }

  /* Crawlstitution logo */
  .event-logo {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0.3;
    height: min(6vh, 40px);
  }

  .event-logo img {
    height: 100%;
    width: auto;
    object-fit: contain;
  }

  /* Auto-reset fade out after 8 seconds */
  .container {
    animation: fade-in 1s ease-out, fade-out 1.5s ease-in 7s forwards;
  }

  @keyframes fade-out {
    to { opacity: 0; transform: translateY(-10px); }
  }
</style>
</head>
<body>
  <!-- Sparkles -->
  <div class="sparkle"></div>
  <div class="sparkle"></div>
  <div class="sparkle"></div>
  <div class="sparkle"></div>
  <div class="sparkle"></div>
  <div class="sparkle"></div>

  <div class="container">
    <!-- Animated checkmark -->
    <div class="check-circle">
      <svg viewBox="0 0 100 100">
        <circle class="circle-bg" cx="50" cy="50" r="45" />
        <circle class="circle-progress" cx="50" cy="50" r="45" />
        <polyline class="checkmark" points="30,52 44,65 70,38" />
      </svg>
    </div>

    <h1>Message received.</h1>
    <p class="message">Now grab a shower beer.</p>
    <p class="beer-hint">Thanks for stopping by The Confessional.</p>
  </div>

  <div class="tile-accent"></div>

  <!-- Crawlstitution logo - replace src with actual logo -->
  <div class="event-logo">
    <img src="crawlstitution-logo.png" alt="The Crawlstitution">
  </div>
</body>
</html>
