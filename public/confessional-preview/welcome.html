<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Confessional - Welcome</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0f0f;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    color: #e8e0d4;
  }

  .container {
    text-align: center;
    padding: 2rem;
    max-width: 600px;
    animation: fade-in 1.2s ease-out;
  }

  @keyframes fade-in {
    0% { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* Logo */
  .logo {
    width: min(40vw, 40vh, 200px);
    height: min(40vw, 40vh, 200px);
    margin: 0 auto 2rem;
    animation: fade-in 1s ease-out;
  }

  .logo img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  /* Decorative line */
  .divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #c2a478, transparent);
    margin: 0 auto 2rem;
    animation: expand 1.5s ease-out 0.3s both;
  }

  @keyframes expand {
    0% { width: 0; opacity: 0; }
    100% { width: 60px; opacity: 1; }
  }

  /* Welcome text */
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.5rem, 5vw, 2.5rem);
    color: #c2a478;
    margin-bottom: 0.5rem;
    letter-spacing: 0.05em;
    animation: fade-in 1s ease-out 0.4s both;
  }

  .subtitle {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 6vw, 3rem);
    font-weight: 700;
    color: #e8e0d4;
    margin-bottom: 2rem;
    animation: fade-in 1s ease-out 0.6s both;
  }

  .description {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: clamp(0.9rem, 2.5vw, 1.15rem);
    line-height: 1.7;
    color: rgba(232, 224, 212, 0.7);
    max-width: 440px;
    margin: 0 auto;
    animation: fade-in 1s ease-out 0.8s both;
  }

  /* Animated teal tile accent */
  .tile-accent {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg,
      transparent 0%,
      #2a9d8f 20%,
      #40b5a6 50%,
      #2a9d8f 80%,
      transparent 100%
    );
    animation: tile-glow 3s ease-in-out infinite;
  }

  @keyframes tile-glow {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.9; }
  }

  /* Crawlstitution logo */
  .event-logo {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0.3;
    height: min(6vh, 40px);
  }

  .event-logo img {
    height: 100%;
    width: auto;
    object-fit: contain;
  }

  /* Subtle water drops animation */
  .drops {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 100%;
    pointer-events: none;
    overflow: hidden;
  }

  .drop {
    position: absolute;
    width: 2px;
    height: 2px;
    background: rgba(42, 157, 143, 0.3);
    border-radius: 50%;
    animation: drip linear infinite;
  }

  @keyframes drip {
    0% { transform: translateY(-10px); opacity: 0; }
    10% { opacity: 0.6; }
    100% { transform: translateY(100vh); opacity: 0; }
  }

  .drop:nth-child(1) { left: 20%; animation-duration: 3s; animation-delay: 0s; }
  .drop:nth-child(2) { left: 35%; animation-duration: 4s; animation-delay: 1.5s; }
  .drop:nth-child(3) { left: 50%; animation-duration: 3.5s; animation-delay: 0.8s; }
  .drop:nth-child(4) { left: 65%; animation-duration: 4.5s; animation-delay: 2.2s; }
  .drop:nth-child(5) { left: 80%; animation-duration: 3.2s; animation-delay: 3s; }
</style>
</head>
<body>
  <div class="drops">
    <div class="drop"></div>
    <div class="drop"></div>
    <div class="drop"></div>
    <div class="drop"></div>
    <div class="drop"></div>
  </div>

  <div class="container">
    <div class="logo">
      <img src="logo.png" alt="The Confessional">
    </div>
    <div class="divider"></div>
    <h1>Welcome to</h1>
    <div class="subtitle">The Confessional</div>
    <p class="description">
      Leave a message for the hosts &mdash; a toast, a roast, a secret, a shoutout. Anything goes.
    </p>
  </div>

  <div class="tile-accent"></div>

  <!-- Crawlstitution logo -->
  <div class="event-logo">
    <img src="crawlstitution-logo.png" alt="The Crawlstitution">
  </div>
</body>
</html>
